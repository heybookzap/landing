<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMERGENCY RESET</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
  }

  body {
    background: #0b0b0e;
    font-family: 'Noto Serif KR', serif;
  }

  /* 배경 미세 방사형 그라디언트 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 55% 45% at 50% 50%, #1c0808 0%, transparent 68%);
    pointer-events: none;
  }

  /* ── 심박 링 ── */
  .pulse-ring {
    position: absolute;
    border-radius: 9999px;
    border: 1px solid rgba(192, 57, 43, 0.18);
    animation: ringPulse 3.2s ease-out infinite;
  }
  .ring-1 { width: 230px; height: 230px; animation-delay: 0s; }
  .ring-2 { width: 310px; height: 310px; animation-delay: 0.9s; }
  .ring-3 { width: 390px; height: 390px; animation-delay: 1.8s; }

  @keyframes ringPulse {
    0%   { opacity: 0;   transform: scale(0.88); }
    25%  { opacity: 0.9; }
    100% { opacity: 0;   transform: scale(1.08); }
  }

  /* ── 메인 버튼 ── */
  #resetBtn {
    position: relative;
    z-index: 10;
    width: 170px;
    height: 170px;
    border-radius: 9999px;
    border: none;
    background: radial-gradient(circle at 36% 34%, #e74c3c, #8b1a10);
    box-shadow:
      0 0 45px rgba(192, 57, 43, 0.5),
      0 0 90px rgba(192, 57, 43, 0.22),
      inset 0 2px 5px rgba(255,255,255,0.12),
      inset 0 -3px 6px rgba(0,0,0,0.45);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.88);
    text-transform: uppercase;
    line-height: 1.6;
    text-align: center;
    animation: breathe 4.2s ease-in-out infinite;
    transition: opacity 0.9s ease, transform 0.9s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  #resetBtn:hover {
    box-shadow:
      0 0 65px rgba(231, 76, 60, 0.7),
      0 0 130px rgba(192, 57, 43, 0.32),
      inset 0 2px 5px rgba(255,255,255,0.15),
      inset 0 -3px 6px rgba(0,0,0,0.45);
  }

  #resetBtn:active { transform: scale(0.96) !important; }

  #resetBtn.hidden-out {
    opacity: 0;
    transform: scale(0.88);
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 0 45px rgba(192,57,43,.5), 0 0 90px rgba(192,57,43,.22),
                  inset 0 2px 5px rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.45);
    }
    50% {
      transform: scale(1.065);
      box-shadow: 0 0 62px rgba(231,76,60,.68), 0 0 120px rgba(192,57,43,.32),
                  inset 0 2px 5px rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.45);
    }
  }

  /* ── 가이드 패널 ── */
  #guidePanel {
    position: absolute;
    z-index: 10;
    width: min(580px, 92vw);
    opacity: 0;
    transform: translateY(18px);
    pointer-events: none;
    transition: opacity 1.1s ease, transform 1.1s ease;
  }
  #guidePanel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* 호흡 텍스트 */
  #breathText {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 3.2vw, 1.45rem);
    font-weight: 300;
    color: rgba(200, 200, 205, 0.4);
    text-align: center;
    letter-spacing: 0.06em;
    margin-bottom: 2.8rem;
    min-height: 2em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 2.2s ease, opacity 1.4s ease;
  }
  #breathText.lit { color: rgba(210, 210, 215, 0.88); }
  #breathText.dim { opacity: 0.3; }

  /* 구분선 */
  .accent-line {
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,57,43,0.65), transparent);
    margin: 0 auto 2.8rem;
  }

  /* 가이드 항목 */
  .g-item {
    display: flex;
    gap: 1.1rem;
    margin-bottom: 1.8rem;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .g-item.show { opacity: 1; transform: translateX(0); }

  .g-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--red-bright);
    letter-spacing: 0.08em;
    padding-top: 0.22rem;
    flex-shrink: 0;
    width: 1.1rem;
    text-align: right;
  }

  .g-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(0.8rem, 2.3vw, 0.92rem);
    font-weight: 300;
    color: #b8b8c0;
    line-height: 1.95;
    letter-spacing: 0.025em;
  }
  .g-text strong { color: #dcdce4; font-weight: 400; }

  /* 각주 */
  #footnote {
    margin-top: 2.8rem;
    padding-top: 1.3rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.62rem, 1.7vw, 0.7rem);
    color: rgba(107, 107, 118, 0.85);
    letter-spacing: 0.06em;
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #footnote.show { opacity: 1; }

  @media (max-width: 480px) {
    #resetBtn { width: 148px; height: 148px; font-size: 0.65rem; }
    .ring-1 { width: 196px; height: 196px; }
    .ring-2 { width: 265px; height: 265px; }
    .ring-3 { width: 334px; height: 334px; }
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden relative">

<!-- ── 버튼 씬 ── -->
<div id="btnScene" class="relative flex items-center justify-center">
  <div class="pulse-ring ring-1 absolute"></div>
  <div class="pulse-ring ring-2 absolute"></div>
  <div class="pulse-ring ring-3 absolute"></div>
  <button id="resetBtn" onclick="activate()">
    EMERGENCY<br>RESET
  </button>
</div>

<!-- ── 가이드 씬 ── -->
<div id="guidePanel">
  <div id="breathText">숨을 깊게 들이마시고...</div>
  <div class="accent-line"></div>

  <div class="g-item" id="g1">
    <span class="g-num">1</span>
    <p class="g-text">지금 느끼는 자책감은 팩트가 아니라,<br>뇌가 피로하다는 <strong>'신호'</strong>일 뿐입니다.</p>
  </div>
  <div class="g-item" id="g2">
    <span class="g-num">2</span>
    <p class="g-text">어제 정해둔 <strong>'단 하나의 목표(One Thing)'</strong>가<br>무엇인지 떠올리십시오.</p>
  </div>
  <div class="g-item" id="g3">
    <span class="g-num">3</span>
    <p class="g-text">지금 당장 카카오톡을 켜고, <strong>CDO(나)</strong>에게<br>오늘의 <strong>MVT(최소 실행 테스트)</strong> 지침을 요청하십시오.<br>10분 안에 답을 드립니다.</p>
  </div>

  <div id="footnote">※ 창을 새로고침하면 다시 리셋 버튼으로 돌아갑니다.</div>
</div>

<script>
  function activate() {
    const btn     = document.getElementById('resetBtn');
    const scene   = document.getElementById('btnScene');
    const panel   = document.getElementById('guidePanel');
    const breath  = document.getElementById('breathText');

    // 1) 버튼 페이드아웃
    btn.style.animation = 'none';
    btn.classList.add('hidden-out');
    scene.style.pointerEvents = 'none';

    // 2) 가이드 패널 등장
    setTimeout(() => {
      panel.classList.add('visible');

      // 호흡 — 들이마시기
      breath.classList.add('lit');

      // 호흡 — 내쉬기
      setTimeout(() => {
        breath.textContent = '천천히... 내쉬세요...';
        breath.classList.remove('lit');
      }, 2600);

      // 호흡 텍스트 흐림
      setTimeout(() => {
        breath.classList.add('dim');
      }, 5000);

      // 항목 순차 등장
      [['g1', 1200], ['g2', 2000], ['g3', 2800]].forEach(([id, delay]) => {
        setTimeout(() => document.getElementById(id).classList.add('show'), delay);
      });

      // 각주
      setTimeout(() => document.getElementById('footnote').classList.add('show'), 3600);

    }, 500);
  }
</script>
</body>
</html>
